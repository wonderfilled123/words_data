name: Daily Article Generation Pipeline

on:
  schedule:
    # 每天 UTC 时间 22:00 触发 (对应北京时间次日早晨 06:00)，为用户提供新鲜的“今日早报”
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许在 GitHub Actions 页面上手动点击触发，方便随时调试

permissions:
  contents: write # 声明拥有对当前仓库的写入推送权限

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # 获取完整提交历史以便推送

    - name: Setup Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'pipeline/package.json'

    - name: Install dependencies
      run: |
        cd pipeline
        npm install

    - name: Run Auto Generation Pipeline
      env:
        ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      run: |
        cd pipeline
        node index.js

    - name: Commit and push updated articles database
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add articlesDB.json
        git commit -m "auto: update articles database via pipeline [skip ci]" || exit 0
        git push
